<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AutoFillGraph v5</title>
  <style>
    /* ── Reset ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Variables ──────────────────────────────────────── */
    :root {
      --c-bg: #0f172a; --c-surface: #1e293b; --c-border: #334155;
      --c-text: #f1f5f9; --c-muted: #94a3b8; --c-accent: #2563eb;
      --c-green: #16a34a; --c-amber: #d97706; --c-red: #dc2626;
      --c-purple: #7c3aed; --c-teal: #0891b2;
      --radius: 6px; --font: 'Segoe UI', system-ui, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--c-bg); color: var(--c-text);
      width: 400px; min-height: 540px;
      font-size: 13px; line-height: 1.5;
    }

    /* ── Header ─────────────────────────────────────────── */
    .header {
      background: linear-gradient(135deg, var(--c-accent) 0%, var(--c-purple) 100%);
      padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-title { font-size: 15px; font-weight: 700; letter-spacing: .3px; }
    .header-sub   { font-size: 10px; opacity: .75; margin-top: 1px; }
    .version-badge {
      font-size: 10px; padding: 2px 7px;
      background: rgba(255,255,255,.18); border-radius: 10px;
    }

    /* ── Tabs ───────────────────────────────────────────── */
    .tabs {
      display: flex; background: var(--c-surface);
      border-bottom: 1px solid var(--c-border);
    }
    .tab {
      flex: 1; padding: 8px 4px; text-align: center; cursor: pointer;
      font-size: 11px; color: var(--c-muted); border: none;
      background: transparent; transition: color .15s;
    }
    .tab:hover     { color: var(--c-text); }
    .tab.active    {
      color: var(--c-accent); font-weight: 600;
      border-bottom: 2px solid var(--c-accent);
    }

    /* ── Panels ─────────────────────────────────────────── */
    .panel { display: none; padding: 14px 16px; }
    .panel.active { display: block; }

    /* ── Buttons ─────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 7px 14px; border-radius: var(--radius);
      border: none; cursor: pointer; font-size: 12px; font-weight: 600;
      transition: filter .15s;
    }
    .btn:hover   { filter: brightness(1.1); }
    .btn:active  { filter: brightness(.9); }
    .btn-primary { background: var(--c-accent); color: #fff; }
    .btn-green   { background: var(--c-green);  color: #fff; }
    .btn-amber   { background: var(--c-amber);  color: #fff; }
    .btn-red     { background: var(--c-red);    color: #fff; }
    .btn-ghost   {
      background: transparent; color: var(--c-muted);
      border: 1px solid var(--c-border);
    }
    .btn-block   { width: 100%; justify-content: center; margin-bottom: 8px; }

    /* ── Action row ─────────────────────────────────────── */
    .action-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .action-row .btn { flex: 1; justify-content: center; }

    /* ── Status card ─────────────────────────────────────── */
    .status-card {
      background: var(--c-surface); border: 1px solid var(--c-border);
      border-radius: var(--radius); padding: 10px 12px; margin-bottom: 12px;
    }
    .status-row { display: flex; justify-content: space-between; align-items: center; }
    .status-label { color: var(--c-muted); font-size: 11px; }
    .status-val   { font-weight: 600; font-size: 12px; }
    .status-val.ok  { color: var(--c-green); }
    .status-val.err { color: var(--c-red); }

    /* ── Stat grid ───────────────────────────────────────── */
    .stat-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; margin-bottom: 12px;
    }
    .stat-box {
      background: var(--c-surface); border: 1px solid var(--c-border);
      border-radius: var(--radius); padding: 8px 10px; text-align: center;
    }
    .stat-num   { font-size: 20px; font-weight: 700; color: var(--c-accent); }
    .stat-label { font-size: 10px; color: var(--c-muted); margin-top: 1px; }

    /* ── Route breakdown ─────────────────────────────────── */
    .route-row {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 0; border-bottom: 1px solid var(--c-border);
      font-size: 11px;
    }
    .route-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .route-name { flex: 1; color: var(--c-text); }
    .route-count { color: var(--c-muted); font-size: 10px; }

    /* ── Bandit panel ────────────────────────────────────── */
    .bandit-row {
      display: flex; justify-content: space-between;
      padding: 5px 0; border-bottom: 1px solid var(--c-border);
      font-size: 11px;
    }
    .bandit-label { color: var(--c-muted); }
    .bandit-val   { font-weight: 600; }

    /* ── History list ────────────────────────────────────── */
    .history-item {
      background: var(--c-surface); border: 1px solid var(--c-border);
      border-radius: var(--radius); padding: 8px 10px; margin-bottom: 6px;
    }
    .history-prop   { font-weight: 600; font-size: 12px; }
    .history-entry  { font-size: 11px; color: var(--c-muted); margin-top: 2px; }
    .history-active { color: var(--c-green); font-weight: 600; }
    .history-exp    { color: var(--c-red); text-decoration: line-through; }

    /* ── Settings ────────────────────────────────────────── */
    .form-group     { margin-bottom: 10px; }
    .form-label     { font-size: 11px; color: var(--c-muted); margin-bottom: 4px; display: block; }
    .form-input     {
      width: 100%; padding: 7px 9px; border-radius: var(--radius);
      border: 1px solid var(--c-border); background: var(--c-surface);
      color: var(--c-text); font-size: 12px;
    }
    .form-input:focus { outline: none; border-color: var(--c-accent); }

    /* ── Sensitivity bar ─────────────────────────────────── */
    .sens-bar { display: flex; gap: 4px; margin-top: 4px; }
    .sens-seg {
      height: 8px; border-radius: 4px; flex: 1;
      background: var(--c-border);
    }
    .sens-seg.filled { background: var(--c-green); }
    .sens-seg.restricted { background: var(--c-amber); }
    .sens-seg.encrypted  { background: var(--c-red); }

    /* ── Loading spinner ─────────────────────────────────── */
    .spinner {
      border: 2px solid var(--c-border);
      border-top-color: var(--c-accent);
      border-radius: 50%; width: 14px; height: 14px;
      animation: spin .7s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ───────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
      background: #1e293b; border: 1px solid var(--c-accent);
      color: var(--c-text); padding: 7px 14px; border-radius: 20px;
      font-size: 12px; opacity: 0; pointer-events: none;
      transition: opacity .2s; z-index: 9999; white-space: nowrap;
    }
    #toast.show { opacity: 1; }

    /* ── Section heading ─────────────────────────────────── */
    .section-heading {
      font-size: 10px; text-transform: uppercase; letter-spacing: .8px;
      color: var(--c-muted); margin-bottom: 8px;
    }

    /* ── Empty state ─────────────────────────────────────── */
    .empty {
      text-align: center; padding: 24px 16px; color: var(--c-muted);
      font-size: 12px;
    }

    /* ── Divider ─────────────────────────────────────────── */
    .divider { border: none; border-top: 1px solid var(--c-border); margin: 12px 0; }

    /* ── Graph node list ─────────────────────────────────── */
    .node-row {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 0; border-bottom: 1px solid var(--c-border);
      font-size: 11px;
    }
    .node-type-badge {
      font-size: 9px; padding: 1px 5px; border-radius: 3px;
      background: var(--c-accent); color: #fff; flex-shrink: 0;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div>
      <div class="header-title">AutoFillGraph</div>
      <div class="header-sub">Agentic KG Autofill · ICML SCALE 2026</div>
    </div>
    <span class="version-badge">v5.0.0</span>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" data-tab="actions">Actions</button>
    <button class="tab" data-tab="insights">Insights</button>
    <button class="tab" data-tab="graph">Graph</button>
    <button class="tab" data-tab="settings">Settings</button>
  </div>

  <!-- ── ACTIONS Panel ─────────────────────────────── -->
  <div class="panel active" id="tab-actions">
    <div class="action-row">
      <button class="btn btn-primary" id="btn-detect">
        <span id="detect-spin" class="spinner" style="display:none"></span>
        Detect Fields
      </button>
      <button class="btn btn-green" id="btn-autofill">
        <span id="fill-spin" class="spinner" style="display:none"></span>
        Autofill
      </button>
    </div>

    <button class="btn btn-amber btn-block" id="btn-learn">
      Learn This Form
    </button>

    <!-- Status -->
    <div class="status-card" id="action-status">
      <div class="status-row">
        <span class="status-label">Status</span>
        <span class="status-val" id="status-text">Ready</span>
      </div>
      <div class="status-row" style="margin-top:4px">
        <span class="status-label">Fields detected</span>
        <span class="status-val" id="fields-count">—</span>
      </div>
      <div class="status-row" style="margin-top:4px">
        <span class="status-label">Last fill</span>
        <span class="status-val" id="last-fill">—</span>
      </div>
    </div>

    <!-- Quick stats -->
    <div class="stat-grid" id="quick-stats">
      <div class="stat-box">
        <div class="stat-num" id="stat-facts">—</div>
        <div class="stat-label">KG Facts</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="stat-episodes">—</div>
        <div class="stat-label">Episodes</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="stat-retriever">—</div>
        <div class="stat-label">Index Size</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="stat-llm-calls">—</div>
        <div class="stat-label">API Calls</div>
      </div>
    </div>

    <!-- LinUCB bandit quick summary -->
    <div class="section-heading">Bandit Router</div>
    <div id="bandit-summary"></div>
  </div>

  <!-- ── INSIGHTS Panel ────────────────────────────── -->
  <div class="panel" id="tab-insights">
    <div class="section-heading">Current Knowledge (Public)</div>
    <div id="insights-list"></div>

    <hr class="divider" />
    <div class="section-heading">Temporal History</div>
    <div id="history-list"></div>

    <hr class="divider" />
    <div class="section-heading">Sensitivity Breakdown</div>
    <div id="sens-breakdown"></div>
  </div>

  <!-- ── GRAPH Panel ───────────────────────────────── -->
  <div class="panel" id="tab-graph">
    <div class="section-heading">Graph Nodes</div>
    <div id="graph-nodes"></div>

    <hr class="divider" />
    <div class="section-heading">Entity Relations</div>
    <div id="graph-entities"></div>

    <hr class="divider" />
    <div class="action-row" style="margin-top:8px">
      <button class="btn btn-ghost" id="btn-export">Export JSON</button>
      <button class="btn btn-red"   id="btn-clear">Clear Graph</button>
    </div>
  </div>

  <!-- ── SETTINGS Panel ────────────────────────────── -->
  <div class="panel" id="tab-settings">
    <div class="form-group">
      <label class="form-label" for="api-key">Mistral API Key</label>
      <input class="form-input" type="password" id="api-key" placeholder="Enter Mistral API key…" />
    </div>
    <div class="form-group">
      <label class="form-label" for="model-select">Model</label>
      <select class="form-input" id="model-select">
        <option value="mistral-small-latest">mistral-small-latest (default)</option>
        <option value="mistral-medium-latest">mistral-medium-latest</option>
        <option value="mistral-large-latest">mistral-large-latest</option>
      </select>
    </div>
    <button class="btn btn-primary btn-block" id="btn-save-key">Save &amp; Test</button>
    <div class="status-card" style="margin-top:8px">
      <div class="status-row">
        <span class="status-label">API Status</span>
        <span id="api-status" class="status-val">—</span>
      </div>
      <div class="status-row" style="margin-top:4px">
        <span class="status-label">Tokens used</span>
        <span id="tokens-used" class="status-val">—</span>
      </div>
    </div>

    <hr class="divider" />
    <div class="section-heading">Privacy</div>
    <div id="privacy-breakdown"></div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <script src="popup_v5.js"></script>
</body>
</html>
