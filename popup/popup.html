<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autofill Graph Assistant</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
    }

    .container {
      padding: 20px;
    }

    header {
      color: white;
      margin-bottom: 20px;
      border-bottom: 2px solid rgba(255, 255, 255, 0.3);
      padding-bottom: 15px;
    }

    h1 {
      font-size: 18px;
      margin-bottom: 5px;
    }

    .status {
      font-size: 12px;
      opacity: 0.9;
    }

    .status.connected {
      color: #90EE90;
    }

    .status.disconnected {
      color: #FFB6C6;
    }

    .section {
      background: white;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #667eea;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::before {
      content: '';
      display: inline-block;
      width: 3px;
      height: 15px;
      background: #667eea;
      border-radius: 2px;
    }

    .form-group {
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 6px;
      color: #666;
    }

    input[type="password"],
    textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 12px;
      font-family: monospace;
    }

    input[type="password"]:focus,
    textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .button-group {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-primary:hover {
      background: #5a6fd5;
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
      border: 1px solid #ddd;
    }

    .btn-secondary:hover {
      background: #e8e8e8;
    }

    .btn-success {
      background: #28a745;
      color: white;
    }

    .btn-success:hover {
      background: #218838;
    }

    .stats {
      background: #f8f9fa;
      padding: 12px;
      border-radius: 4px;
      font-size: 12px;
      line-height: 1.6;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      border-bottom: 1px solid #e0e0e0;
    }

    .stat-row:last-child {
      border-bottom: none;
    }

    .stat-label {
      color: #666;
      font-weight: 500;
    }

    .stat-value {
      color: #667eea;
      font-weight: 600;
      text-align: right;
    }

    .message {
      padding: 10px;
      border-radius: 4px;
      font-size: 12px;
      margin-bottom: 12px;
    }

    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .message.info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 15px;
      border-bottom: 2px solid #e0e0e0;
    }

    .tab {
      padding: 8px 12px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      color: #999;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }

    .tab.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .loading {
      text-align: center;
      color: #999;
      padding: 20px;
    }

    .spinner {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #667eea;
      border-radius: 50%;
      animation: spin 0.6s infinite;
      margin-right: 5px;
    }

    @keyframes spin {
      0%, 100% { transform: scale(0.8); opacity: 0.5; }
      50% { transform: scale(1.2); opacity: 1; }
    }

    .graph-preview {
      background: #f8f9fa;
      padding: 10px;
      border-radius: 4px;
      font-size: 11px;
      font-family: monospace;
      max-height: 150px;
      overflow-y: auto;
      border: 1px solid #e0e0e0;
    }

    .node-item {
      padding: 4px 0;
      color: #667eea;
    }

    .edge-item {
      padding: 4px 0;
      color: #666;
      font-size: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Autofill Graph</h1>
      <div class="status disconnected" id="statusText">Connecting...</div>
    </header>

    <div id="messageContainer"></div>

    <div class="tabs">
      <button class="tab active" data-tab="quick">Quick Actions</button>
      <button class="tab" data-tab="settings">Settings</button>
      <button class="tab" data-tab="graph">Graph View</button>
    </div>

    <!-- Quick Actions Tab -->
    <div id="quick" class="tab-content active">
      <div class="section">
        <div class="section-title">Form Actions</div>
        <div class="button-group">
          <button class="btn-primary" id="detectFormsBtn">Detect Forms</button>
          <button class="btn-success" id="autofillBtn">Autofill</button>
        </div>
        <button class="btn-secondary" id="learnBtn" style="width: 100%; margin-top: 8px;">Learn This Form</button>
      </div>

      <div class="section">
        <div class="section-title">Graph Status</div>
        <div class="stats" id="graphStats">
          <div class="loading"><span class="spinner"></span>Loading...</div>
        </div>
      </div>
    </div>

    <!-- Settings Tab -->
    <div id="settings" class="tab-content">
      <div class="section">
        <div class="section-title">API Configuration</div>
        <div class="form-group">
          <label>Mistral API Key</label>
          <input type="password" id="apiKeyInput" placeholder="Enter your Mistral API key">
          <small style="color: #999; margin-top: 5px; display: block;">
            Get your key from <a href="https://console.mistral.ai/api-keys/" target="_blank" style="color: #667eea;">console.mistral.ai</a>
          </small>
        </div>
        <button class="btn-primary" id="saveApiKeyBtn" style="width: 100%;">Save API Key</button>
      </div>

      <div class="section">
        <div class="section-title">Data Management</div>
        <button class="btn-secondary" id="clearGraphBtn" style="width: 100%; margin-bottom: 8px;">Clear Graph</button>
        <button class="btn-secondary" id="exportGraphBtn" style="width: 100%;">Export Graph</button>
      </div>
    </div>

    <!-- Graph View Tab -->
    <div id="graph" class="tab-content">
      <div class="section">
        <div class="section-title">Knowledge Graph Preview</div>
        <div id="graphPreview" class="graph-preview">
          <div style="text-align: center; color: #999; padding: 20px;">Graph will appear here</div>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
